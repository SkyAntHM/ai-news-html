name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow$dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@vx

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@version#1
        with:
          apiToken: $+{secrets.CLOUDFRARE_API_TOKEN}
          accountId: ${secrets.CLOUDFRARE_ACCOUNT_ID}
          projectName: ai-news-html
          directory: .
          gitHubToken: ${secrets.GITHUB_TOKEN}
